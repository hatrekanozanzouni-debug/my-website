<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقعي الشخصي</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {margin:0;font-family:tahoma;background:#fafafa;}
.header, .nav {display:flex;justify-content:space-between;align-items:center;padding:10px;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,0.1);}
.header .center {font-weight:bold;font-size:22px;color:#000;}
.stories {display:flex;gap:10px;padding:10px;overflow-x:auto;background:#fff;}
.story {text-align:center;font-size:12px;cursor:pointer;}
.story img {width:50px;height:50px;border-radius:50%;border:2px solid #ed4956;object-fit:cover;}
.post {background:#fff;max-width:450px;margin:15px auto;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:10px;}
.actions {display:flex;align-items:center;gap:10px;margin-top:5px;}
.actions button{font-size:18px;background:none;border:none;cursor:pointer;}
#newPostModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#newPostModal form{background:#fff;padding:15px;border-radius:10px;width:90%;max-width:400px;display:flex;flex-direction:column;gap:8px;}
#newPostModal textarea{height:80px;padding:6px;border-radius:6px;border:1px solid #ccc;}
#newPostModal button{padding:8px;border:none;border-radius:6px;background:#0095f6;color:#fff;font-weight:bold;cursor:pointer;}
.nav i {font-size:24px;color:#000;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
    <div class="left"><i class="fas fa-plus" id="openPostModal"></i></div>
    <div class="center">AZZAM</div>
    <div class="right"><i class="far fa-heart"></i></div>
</div>

<!-- نموذج رفع منشور -->
<div id="newPostModal">
    <form id="postForm">
        <textarea id="postText" placeholder="اكتب نص المنشور هنا..."></textarea>
        <button type="submit">نشر</button>
    </form>
</div>

<!-- القصص -->
<div class="stories" id="storiesContainer">
    <div class="story">
        <img src="https://via.placeholder.com/50">
        <div>أحمد</div>
    </div>
    <div class="story">
        <img src="https://via.placeholder.com/50">
        <div>سارة</div>
    </div>
</div>

<!-- المنشورات -->
<div id="postsContainer">
    <div class="post">
        <p>مرحباً، هذا منشور تجريبي!</p>
        <div class="actions">
            <button class="likeBtn"><i class="far fa-heart"></i></button><span>0</span>
            <button class="commentBtn"><i class="far fa-comment"></i></button><span>0</span>
        </div>
    </div>
</div>

<div style="height:50px;"></div>

<!-- شريط التنقل -->
<div class="nav">
    <i class="fas fa-home"></i>
    <i class="fas fa-video"></i>
    <i class="far fa-paper-plane"></i>
    <i class="fas fa-search"></i>
    <i class="fas fa-user"></i>
</div>

<script>
// فتح/إغلاق نموذج رفع منشور
const openModal = document.getElementById('openPostModal');
const modal = document.getElementById('newPostModal');
openModal.onclick = ()=> modal.style.display='flex';
window.onclick = e=>{ if(e.target==modal) modal.style.display='none'; }

// إضافة منشور جديد
document.getElementById('postForm').onsubmit = function(e){
    e.preventDefault();
    const text = document.getElementById('postText').value;
    if(!text) return;
    const postContainer = document.getElementById('postsContainer');
    const div = document.createElement('div');
    div.className='post';
    div.innerHTML = `<p>${text}</p>
        <div class="actions">
            <button class="likeBtn"><i class="far fa-heart"></i></button><span>0</span>
            <button class="commentBtn"><i class="far fa-comment"></i></button><span>0</span>
        </div>`;
    postContainer.prepend(div);
    modal.style.display='none';
    document.getElementById('postText').value='';
    attachPostEvents(div);
}

// وظائف Like و Comment
function attachPostEvents(post){
    post.querySelector('.likeBtn').onclick = function(){
        const i = this.querySelector('i');
        const span = this.nextElementSibling;
        if(i.classList.contains('far')){i.className='fas fa-heart';span.textContent++;}
        else{i.className='far fa-heart';span.textContent--;}
    }
    post.querySelector('.commentBtn').onclick = function(){
        alert('خاصية التعليقات مؤقتة!');
    }
}

// تفعيل المنشورات الموجودة
document.querySelectorAll('.post').forEach(attachPostEvents);
</script>

</body>
</html>
